<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный чат</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: #f6f7f9;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    background: white;
    padding: 14px 20px;
    border-bottom: 1px solid #e5e7eb;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 12px;
}

#backBtn {
    background: none;
    border: none;
    padding: 4px 8px 4px 0;
    cursor: pointer;
    font-size: 18px;
    color: #333;
    border-radius: 8px;
}

#backBtn:hover { background: #f3f4f6; }

#headerName { flex: 1; }

#status {
    font-size: 12px;
    color: #666;
    font-weight: 400;
}

/* Экран выбора собеседника */
#selectScreen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 20px;
    padding: 20px;
}

#selectScreen h2 {
    margin: 0;
    font-size: 18px;
    color: #111;
}

#selectScreen p {
    margin: 0;
    color: #666;
    font-size: 14px;
    text-align: center;
}

.select-box {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 16px;
    padding: 20px;
    width: 100%;
    max-width: 400px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.select-box label {
    font-size: 13px;
    font-weight: 500;
    color: #555;
}

.select-box input {
    padding: 10px 14px;
    border: 1px solid #ddd;
    border-radius: 10px;
    font-size: 14px;
    font-family: Inter, sans-serif;
    outline: none;
    transition: border-color 0.15s;
}

.select-box input:focus { border-color: #111; }

.select-box button {
    background: black;
    color: white;
    border: none;
    padding: 11px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    font-family: Inter, sans-serif;
    transition: opacity 0.15s;
}

.select-box button:hover { opacity: 0.85; }

#selectError {
    font-size: 13px;
    color: #e53e3e;
    display: none;
}

/* Экран чата */
#chatScreen {
    flex: 1;
    display: none;
    flex-direction: column;
    overflow: hidden;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
}

/* Telegram-стиль пузырей */
.msg-wrap {
    display: flex;
    width: 100%;
}

.msg-wrap.mine { justify-content: flex-end; }
.msg-wrap.theirs { justify-content: flex-start; }

.bubble {
    max-width: 68%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
}

.mine .bubble {
    background: #111;
    color: white;
    border-bottom-right-radius: 4px;
}

.theirs .bubble {
    background: white;
    border: 1px solid #e5e7eb;
    color: #111;
    border-bottom-left-radius: 4px;
}

.bubble-meta {
    font-size: 11px;
    margin-top: 4px;
    opacity: 0.6;
}

.mine .bubble-meta { text-align: right; }
.theirs .bubble-meta { text-align: left; color: #666; }

#inputBar {
    display: flex;
    gap: 10px;
    padding: 12px;
    border-top: 1px solid #e5e7eb;
    background: white;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
    align-self: center;
    width: 100%;
}

#msgInput {
    flex: 1;
    padding: 12px 14px;
    border-radius: 20px;
    border: 1px solid #ddd;
    outline: none;
    font-family: Inter, sans-serif;
    font-size: 14px;
    resize: none;
    transition: border-color 0.15s;
}

#msgInput:focus { border-color: #111; }

#sendBtn {
    background: black;
    color: white;
    border: none;
    padding: 0 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: opacity 0.15s;
    white-space: nowrap;
}

#sendBtn:hover { opacity: 0.85; }

/* Загрузка */
.loading {
    text-align: center;
    color: #aaa;
    font-size: 13px;
    padding: 20px;
}

</style>
</head>
<body>

<header>
    <button id="backBtn" onclick="goBack()">←</button>
    <span id="headerName">Личный чат</span>
    <span id="status"></span>
</header>

<!-- Экран выбора собеседника -->
<div id="selectScreen">
    <h2>Начать личный чат</h2>
    <p>Введи ID пользователя, которому хочешь написать</p>

    <div class="select-box">
        <label>ID собеседника</label>
        <input id="targetIdInput" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
        <span id="selectError">Пользователь не найден</span>
        <button onclick="openChat()">Открыть чат</button>
    </div>
</div>

<!-- Экран чата -->
<div id="chatScreen">
    <div id="messages">
        <div class="loading">Загрузка...</div>
    </div>
    <div id="inputBar">
        <input id="msgInput" placeholder="Сообщение...">
        <button id="sendBtn">Отправить</button>
    </div>
</div>

<script>

// ─── Состояние ───────────────────────────────────────────────
let myId = localStorage.getItem("id");
let myName = localStorage.getItem("name");
let chatId = null;
let targetId = null;
let targetName = null;
let ws = null;

const selectScreen = document.getElementById("selectScreen");
const chatScreen   = document.getElementById("chatScreen");
const messagesEl   = document.getElementById("messages");
const statusEl     = document.getElementById("status");
const headerName   = document.getElementById("headerName");
const msgInput     = document.getElementById("msgInput");
const selectError  = document.getElementById("selectError");

// ─── Инициализация ───────────────────────────────────────────
async function ensureRegistered() {
    if (myId) return true;

    const name = prompt("Введи своё имя:") || "anon";
    try {
        const res = await fetch(`/register?name=${encodeURIComponent(name)}`);
        const data = await res.json();
        myId   = data.id;
        myName = data.name;
        localStorage.setItem("id",   myId);
        localStorage.setItem("name", myName);
        return true;
    } catch {
        return false;
    }
}

// ─── Открытие чата ───────────────────────────────────────────
async function openChat(prefillTargetId) {
    selectError.style.display = "none";

    if (!(await ensureRegistered())) return;

    targetId = prefillTargetId || document.getElementById("targetIdInput").value.trim();
    if (!targetId) return;

    // if (targetId === myId) {
    //     selectError.textContent = "Нельзя писать самому себе";
    //     selectError.style.display = "block";
    //     return;
    // }

    try {
        const res = await fetch(`/chat/open?with_id=${encodeURIComponent(targetId)}`, {
            headers: { "X-User-Id": myId }
        });

        if (!res.ok) {
            selectError.textContent = "Пользователь не найден";
            selectError.style.display = "block";
            return;
        }

        const data = await res.json();
        chatId = data.chat_id;

    } catch {
        selectError.textContent = "Ошибка соединения";
        selectError.style.display = "block";
        return;
    }

    // Показываем экран чата
    selectScreen.style.display = "none";
    chatScreen.style.display   = "flex";
    headerName.textContent     = targetId.slice(0, 8) + "…";

    connectWs();
    msgInput.focus();
}

// ─── WebSocket ───────────────────────────────────────────────
function connectWs() {
    if (ws) ws.close();

    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws/chat/${chatId}`);

    ws.onopen  = () => { statusEl.textContent = "online"; };
    ws.onclose = () => { statusEl.textContent = "offline"; };
    ws.onerror = () => { statusEl.textContent = "ошибка"; };

    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);

        if (data.type === "history") {
            messagesEl.innerHTML = "";
            if (data.messages.length === 0) {
                messagesEl.innerHTML = '<div class="loading">Сообщений пока нет</div>';
            } else {
                data.messages.forEach(addMessage);
            }
        }

        if (data.type === "message") {
            // убираем заглушку если она ещё есть
            const placeholder = messagesEl.querySelector(".loading");
            if (placeholder) placeholder.remove();
            addMessage(data.message);
        }
    };
}

// ─── Добавление сообщения ─────────────────────────────────────
function addMessage(msg) {
    const isMine = msg.sender_id === myId;

    const wrap = document.createElement("div");
    wrap.className = `msg-wrap ${isMine ? "mine" : "theirs"}`;

    const time = new Date(msg.timestamp).toLocaleTimeString([], {
        hour: "2-digit", minute: "2-digit"
    });

    wrap.innerHTML = `
        <div class="bubble">
            ${escapeHtml(msg.text)}
            <div class="bubble-meta">${isMine ? "" : escapeHtml(msg.sender) + " · "}${time}</div>
        </div>
    `;

    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ─── Отправка ─────────────────────────────────────────────────
async function sendMessage() {
    const text = msgInput.value.trim();
    if (!text || !chatId || !myId) return;

    msgInput.value = "";

    const res = await fetch(`/chat/${chatId}/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "X-User-Id": myId
        },
        body: JSON.stringify({ text })
    });

    if (!res.ok) {
        console.error("Ошибка отправки:", await res.text());
    }
}

// ─── Назад ────────────────────────────────────────────────────
function goBack() {
    if (ws) ws.close();
    window.location.href = "/";
}

// ─── Хелперы ──────────────────────────────────────────────────
function escapeHtml(s) {
    return String(s)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
}

// ─── Листенеры ────────────────────────────────────────────────
document.getElementById("sendBtn").addEventListener("click", sendMessage);

msgInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

document.getElementById("targetIdInput").addEventListener("keydown", e => {
    if (e.key === "Enter") openChat();
});

// ─── Открытие из общего чата ──────────────────────────────────
// index.html должен делать так при клике на имя:
//   window.location.href = `/chat?with=${userId}`;
const params = new URLSearchParams(location.search);
const withId = params.get("with");
if (withId) {
    document.getElementById("targetIdInput").value = withId;
    openChat(withId);
}

</script>

</body>
</html>
