<!DOCTYPE html>
<html>
<head>
    <title>Voice Chat</title>
</head>
<body>

<h2>Voice Chat</h2>

<input id="room" placeholder="room id">
<button id="joinBtn">Join</button>
<button id="leaveBtn" disabled>❌ Выйти</button>

<button id="camBtn" disabled>📷 Включить вебку</button>
<button id="screenBtn" disabled>🖥️ Включить экран</button>

<div id="status"></div>
<div id="users"></div>

<div id="localVideos" style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;"></div>
<div id="remoteVideos" style="display:flex; gap:10px; flex-wrap:wrap;"></div>

<script src="/socket.io.min.js"></script>
<script>
const socket = io();

let pc = null;
let room = null;
let joined = false;

let localStream = null;
let cameraStream = null;
let screenStream = null;

let cameraSender = null;
let screenSender = null;

let camBusy = false;

const remoteVideos = new Map();

const config = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

// ---------------- UI ----------------
function setStatus(msg) {
    document.getElementById("status").textContent = msg;
    console.log(msg);
}

document.getElementById("joinBtn").addEventListener("click", joinRoom);
document.getElementById("leaveBtn").addEventListener("click", leaveRoom);
document.getElementById("camBtn").addEventListener("click", toggleCamera);
document.getElementById("screenBtn").addEventListener("click", toggleScreen);

// ---------------- SOCKET ----------------
socket.on("connect", () => setStatus("Connected"));

socket.on("room-users", (users) => {
    document.getElementById("users").innerHTML =
        "<b>Users:</b><br>" + users.map(u => "• " + u).join("<br>");
});

socket.on("room-full", () => {
    alert("Room is full (max 2 users)");
});

socket.on("user-left", () => {
    setStatus("User left");

    if (pc) {
        pc.close();
        pc = null;
    }

    remoteVideos.clear();
    document.getElementById("remoteVideos").innerHTML = "";
});

socket.on("signal", async (data) => {
    if (!pc) createPeer();

    if (data.sdp) {
        await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));

        if (data.sdp.type === "offer") {
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit("signal", { room, sdp: answer });
        }
    }

    if (data.candidate) {
        try {
            await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
        } catch (e) {}
    }
});

// ---------------- PEER ----------------
function createPeer() {
    if (pc) pc.close();

    pc = new RTCPeerConnection(config);

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit("signal", { room, candidate: e.candidate });
        }
    };

    pc.ontrack = (e) => {
        const stream = e.streams[0];
        if (!stream) return;

        if (e.track.kind === "audio") {
            let audio = document.getElementById("audio-" + stream.id);

            if (!audio) {
                audio = document.createElement("audio");
                audio.autoplay = true;
                audio.id = "audio-" + stream.id;
                document.body.appendChild(audio);
            }

            audio.srcObject = stream;
            return;
        }

        if (e.track.kind === "video") {
            let video = remoteVideos.get(stream.id);

            if (!video) {
                video = document.createElement("video");
                video.autoplay = true;
                video.playsInline = true;
                video.style.width = "320px";
                video.style.background = "#000";

                document.getElementById("remoteVideos").appendChild(video);
                remoteVideos.set(stream.id, video);

                stream.onremovetrack = () => {
                    video.remove();
                    remoteVideos.delete(stream.id);
                };
            }

            video.srcObject = stream;
        }
    };
}

// ---------------- JOIN ----------------
async function joinRoom() {
    if (joined) return;

    room = document.getElementById("room").value.trim();
    if (!room) return alert("Enter room id");

    // reset old pc if exists
    if (pc) {
        pc.close();
        pc = null;
    }

    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (e) {
        return alert("Mic error: " + e.message);
    }

    createPeer();

    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    socket.emit("join", { room });

    setTimeout(() => {
        renegotiate();
    }, 300);

    joined = true;

    document.getElementById("camBtn").disabled = false;
    document.getElementById("screenBtn").disabled = false;
    document.getElementById("leaveBtn").disabled = false;

    setStatus("Joined room");
}

// ---------------- LEAVE ----------------
async function leaveRoom() {
    setStatus("Leaving room...");

    if (cameraStream) {
        cameraStream.getTracks().forEach(t => t.stop());
        cameraStream = null;
    }

    if (screenStream) {
        screenStream.getTracks().forEach(t => t.stop());
        screenStream = null;
    }

    if (pc) {
        pc.close();
        pc = null;
    }

    remoteVideos.clear();

    document.getElementById("localVideos").innerHTML = "";
    document.getElementById("remoteVideos").innerHTML = "";
    document.getElementById("users").innerHTML = "";

    socket.emit("leave", { room });

    room = null;
    joined = false;

    document.getElementById("camBtn").disabled = true;
    document.getElementById("screenBtn").disabled = true;
    document.getElementById("leaveBtn").disabled = true;

    setStatus("Left room");
}

// ---------------- RENEGOTIATE ----------------
async function renegotiate() {
    if (!pc) return;
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit("signal", { room, sdp: offer });
}

// ---------------- CAMERA ----------------
async function toggleCamera() {
    if (camBusy) return;
    camBusy = true;

    const btn = document.getElementById("camBtn");
    btn.disabled = true;

    try {
        if (!cameraStream) {
            cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });

            const video = document.createElement("video");
            video.id = "localCam";
            video.autoplay = true;
            video.playsInline = true;
            video.muted = true;
            video.style.width = "320px";
            video.srcObject = cameraStream;

            document.getElementById("localVideos").appendChild(video);

            const track = cameraStream.getVideoTracks()[0];

            if (!pc.getSenders().some(s => s.track === track)) {
                cameraSender = pc.addTrack(track, cameraStream);
            }

            btn.textContent = "⛔ Выключить вебку";

        } else {
            cameraStream.getTracks().forEach(t => t.stop());

            if (cameraSender) {
                pc.removeTrack(cameraSender);
                cameraSender = null;
            }

            cameraStream = null;

            const v = document.getElementById("localCam");
            if (v) v.remove();

            btn.textContent = "📷 Включить вебку";
        }

        await renegotiate();

    } catch (e) {
        alert("Camera error: " + e.message);
    }

    btn.disabled = false;
    camBusy = false;
}

// ---------------- SCREEN ----------------
async function toggleScreen() {
    const btn = document.getElementById("screenBtn");

    try {
        if (!screenStream) {
            screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true });

            const video = document.createElement("video");
            video.id = "localScreen";
            video.autoplay = true;
            video.playsInline = true;
            video.muted = true;
            video.style.width = "320px";
            video.srcObject = screenStream;

            document.getElementById("localVideos").appendChild(video);

            screenSender = pc.addTrack(screenStream.getVideoTracks()[0], screenStream);

            screenStream.getVideoTracks()[0].onended = () => toggleScreen();

            btn.textContent = "⛔ Выключить экран";

        } else {
            screenStream.getTracks().forEach(t => t.stop());

            if (screenSender) {
                pc.removeTrack(screenSender);
                screenSender = null;
            }

            screenStream = null;

            const v = document.getElementById("localScreen");
            if (v) v.remove();

            btn.textContent = "🖥️ Включить экран";
        }

        await renegotiate();

    } catch (e) {
        alert("Screen error: " + e.message);
    }
}
</script>

</body>
</html>
