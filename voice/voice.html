<!DOCTYPE html>
<html>
<head>
    <title>Voice Chat</title>
</head>
<body>
<h2>Voice Chat</h2>
<input id="room" placeholder="room id">
<button id="joinBtn">Join</button>
<button id="camBtn" disabled>📷 Включить вебку</button>
<button id="screenBtn" disabled>🖥️ Включить экран</button>

<div id="status"></div>

<div id="localVideos" style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;"></div>
<div id="remoteVideos" style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;"></div>

<script src="/socket.io.min.js"></script>
<script>
const socket = io();
let pc = null;
let localStream = null;        // аудио (микрофон)
let cameraStream = null;
let screenStream = null;

let room = null;
let joined = false;

const config = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

function setStatus(msg) {
    document.getElementById("status").textContent = msg;
    console.log(msg);
}

document.getElementById("joinBtn").addEventListener("click", joinRoom);
document.getElementById("camBtn").addEventListener("click", toggleCamera);
document.getElementById("screenBtn").addEventListener("click", toggleScreen);

socket.on("connect", () => setStatus("Connected to server"));

socket.on("room-state", (data) => {
    setStatus(`Users in room: ${data.count}`);
});

socket.on("user-joined", () => {
    setStatus("New user joined, creating offer...");
    if (!pc) createPeer();
    renegotiate();
});

socket.on("signal", async (data) => {
    if (!pc) createPeer();

    if (data.sdp) {
        await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));

        if (data.sdp.type === "offer") {
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit("signal", { room, sdp: answer });
        }
    }

    if (data.candidate) {
        try {
            await pc.addIceCandidate(new RTCIceCandidate(data.candidate));
        } catch (e) {
            console.log("ICE error", e);
        }
    }
});

function createPeer() {
    if (pc) pc.close();
    pc = new RTCPeerConnection(config);

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit("signal", { room, candidate: e.candidate });
        }
    };

    pc.onconnectionstatechange = () => {
        setStatus("WebRTC: " + pc.connectionState);
    };

    pc.ontrack = (e) => {
        const stream = e.streams[0];
        if (!stream) return;

        if (e.track.kind === "audio") {
            const audio = document.createElement("audio");
            audio.srcObject = stream;
            audio.autoplay = true;
            document.body.appendChild(audio);
            setStatus("Audio received");
        }

        if (e.track.kind === "video") {
            const video = document.createElement("video");
            video.srcObject = stream;
            video.autoplay = true;
            video.playsInline = true;
            video.style.width = "320px";
            video.style.background = "#000";
            document.getElementById("remoteVideos").appendChild(video);
            setStatus("Video received");
        }
    };
}

async function joinRoom() {
    if (joined) return;
    room = document.getElementById("room").value.trim();
    if (!room) return alert("Enter room id");

    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        setStatus("Microphone OK");
    } catch (err) {
        console.error(err);
        return alert("Microphone error: " + err.message);
    }

    joined = true;
    createPeer();

    // Добавляем аудио сразу
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    socket.emit("join", { room });
    document.getElementById("camBtn").disabled = false;
    document.getElementById("screenBtn").disabled = false;
}

async function renegotiate() {
    if (!pc) return;
    try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit("signal", { room, sdp: offer });
    } catch (e) {
        console.error("Renegotiation error", e);
    }
}

// ==================== CAMERA ====================
async function toggleCamera() {
    const btn = document.getElementById("camBtn");
    const isEnabled = !!cameraStream;

    if (!isEnabled) {
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ video: true });

            const localVideo = document.createElement("video");
            localVideo.id = "localCam";
            localVideo.srcObject = cameraStream;
            localVideo.autoplay = true;
            localVideo.muted = true;
            localVideo.style.width = "320px";
            document.getElementById("localVideos").appendChild(localVideo);

            cameraStream.getTracks().forEach(track => pc.addTrack(track, cameraStream));

            btn.textContent = "⛔ Выключить вебку";
            setStatus("Camera ON");
        } catch (err) {
            alert("Camera error: " + err.message);
            return;
        }
    } else {
        // Выключаем камеру
        if (cameraStream) {
            cameraStream.getTracks().forEach(t => t.stop());
            cameraStream = null;
        }
        const localCam = document.getElementById("localCam");
        if (localCam) localCam.remove();

        // Удаляем только видео-треки от камеры
        pc.getSenders()
            .filter(sender => sender.track && 
                   sender.track.kind === "video" && 
                   !sender.track.label.includes("screen")) // грубая проверка
            .forEach(sender => pc.removeTrack(sender));

        btn.textContent = "📷 Включить вебку";
        setStatus("Camera OFF");
    }

    await renegotiate();
}

// ==================== SCREEN ====================
async function toggleScreen() {
    const btn = document.getElementById("screenBtn");
    const isEnabled = !!screenStream;

    if (!isEnabled) {
        try {
            screenStream = await navigator.mediaDevices.getDisplayMedia({
                video: true,
                audio: false // можно включить, если нужно
            });

            const localScreen = document.createElement("video");
            localScreen.id = "localScreen";
            localScreen.srcObject = screenStream;
            localScreen.autoplay = true;
            localScreen.muted = true;
            localScreen.style.width = "320px";
            document.getElementById("localVideos").appendChild(localScreen);

            screenStream.getTracks().forEach(track => pc.addTrack(track, screenStream));

            btn.textContent = "⛔ Выключить экран";
            setStatus("Screen sharing ON");

            // Авто-выключение при остановке шаринга
            screenStream.getVideoTracks()[0].onended = () => {
                if (screenStream) toggleScreen();
            };
        } catch (err) {
            alert("Screen share error: " + err.message);
            return;
        }
    } else {
        if (screenStream) {
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;
        }
        const localScreen = document.getElementById("localScreen");
        if (localScreen) localScreen.remove();

        // Удаляем только screen-треки
        pc.getSenders()
            .filter(sender => sender.track && sender.track.kind === "video")
            .forEach(sender => pc.removeTrack(sender)); // можно улучшить фильтрацию

        btn.textContent = "🖥️ Включить экран";
        setStatus("Screen sharing OFF");
    }

    await renegotiate();
}
</script>
</body>
</html>
