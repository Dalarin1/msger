<!DOCTYPE html>
<html>
<head>
    <title>Voice Chat</title>
</head>
<body>
<h2>Voice Chat</h2>
<input id="room" placeholder="room id">
<button id="joinBtn">Join</button>
<button id="camBtn" disabled>📷 Включить вебку</button>
<button id="screenBtn" disabled>🖥️ Включить экран</button>

<div id="status"></div>

<div id="videos" style="display:flex; gap:10px; margin-top:10px; flex-wrap:wrap;">
    <video id="localVideo" autoplay muted playsinline style="width:320px; background:#000; display:none;"></video>
    <video id="remoteVideo" autoplay playsinline style="width:320px; background:#000; display:none;"></video>
</div>

<script src="/socket.io.min.js"></script>
<script>
const socket = io();
let pc = null;
let localStream = null;
let localVideoStream = null;
let screenStream = null;

let room = null;
let pendingCandidates = [];
let joined = false;
let videoEnabled = false;
let screenEnabled = false;

const config = {
    iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
};

function setStatus(msg) {
    document.getElementById("status").textContent = msg;
    console.log(msg);
}

document.getElementById("joinBtn").addEventListener("click", joinRoom);
document.getElementById("camBtn").addEventListener("click", toggleCamera);
document.getElementById("screenBtn").addEventListener("click", toggleScreen);

socket.on("connect", () => setStatus("Connected to server"));

socket.on("room-state", (data) => {
    setStatus("Users in room: " + data.count);
});

socket.on("user-joined", async () => {
    setStatus("New user joined, creating offer...");
    if (!pc) createPeer();
    try {
        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        socket.emit("signal", { room, sdp: offer });
    } catch (e) {
        console.error("Offer error", e);
    }
});

socket.on("signal", async (data) => {
    console.log("SIGNAL RECEIVED", data.sdp ? data.sdp.type : "candidate");
    if (!pc) createPeer();

    if (data.sdp) {
        await pc.setRemoteDescription(new RTCSessionDescription(data.sdp));

        for (const c of pendingCandidates) {
            try { await pc.addIceCandidate(new RTCIceCandidate(c)); }
            catch (e) { console.log("ICE replay error", e); }
        }
        pendingCandidates = [];

        if (data.sdp.type === "offer") {
            const answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit("signal", { room, sdp: answer });
        }
    }

    if (data.candidate) {
        if (!pc.remoteDescription || !pc.remoteDescription.type) {
            pendingCandidates.push(data.candidate);
            return;
        }
        try { await pc.addIceCandidate(new RTCIceCandidate(data.candidate)); }
        catch (e) { console.log("ICE ERROR", e); }
    }
});

function createPeer() {
    if (pc) pc.close();
    pc = new RTCPeerConnection(config);
    pendingCandidates = [];

    pc.onicecandidate = (e) => {
        if (e.candidate) {
            socket.emit("signal", { room, candidate: e.candidate });
        }
    };

    pc.onconnectionstatechange = () => {
        setStatus("WebRTC: " + pc.connectionState);
    };

    pc.ontrack = (e) => {
        const stream = e.streams[0];

        if (e.track.kind === "audio") {
            setStatus("Audio received!");
            const existing = document.getElementById("remote-audio");
            const audio = existing || document.createElement("audio");
            audio.id = "remote-audio";
            audio.srcObject = stream;
            audio.autoplay = true;
            if (!existing) document.body.appendChild(audio);
            audio.play().catch(err => console.log("play error", err));
        }

        if (e.track.kind === "video") {
            setStatus("Video received!");
            const remoteVideo = document.getElementById("remoteVideo");
            remoteVideo.srcObject = stream;
            remoteVideo.style.display = "block";
        }
    };

    if (localStream) {
        localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
    }
}

async function joinRoom() {
    if (joined) return;
    room = document.getElementById("room").value.trim();
    if (!room) { alert("Enter a room id"); return; }

    try {
        localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        setStatus("Microphone OK, joining room...");
    } catch (err) {
        console.error("MIC ERROR", err);
        alert("Microphone error: " + err.message);
        return;
    }

    joined = true;
    createPeer();
    socket.emit("join", { room });
    document.getElementById("camBtn").disabled = false;
    document.getElementById("screenBtn").disabled = false;
}

async function toggleCamera() {
    const btn = document.getElementById("camBtn");
    const localVideo = document.getElementById("localVideo");

    if (!videoEnabled) {
        try {
            localVideoStream = await navigator.mediaDevices.getUserMedia({ video: true });
            localVideo.srcObject = localVideoStream;
            localVideo.style.display = "block";

            const videoTrack = localVideoStream.getVideoTracks()[0];

            if (pc) {
                pc.addTrack(videoTrack, localVideoStream);
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit("signal", { room, sdp: offer });
            }

            videoEnabled = true;
            btn.textContent = "⛔ Выключить вебку";
            setStatus("Camera ON");
        } catch (err) {
            console.error("CAM ERROR", err);
            alert("Camera error: " + err.message);
        }
    } else {
        if (localVideoStream) {
            localVideoStream.getTracks().forEach(t => t.stop());
            localVideoStream = null;
        }

        localVideo.srcObject = null;
        localVideo.style.display = "none";

        if (pc) {
            pc.getSenders()
                .filter(s => s.track && s.track.kind === "video")
                .forEach(s => pc.removeTrack(s));

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit("signal", { room, sdp: offer });
        }

        videoEnabled = false;
        btn.textContent = "📷 Включить вебку";
        setStatus("Camera OFF");
    }
}

async function toggleScreen() {
    const btn = document.getElementById("screenBtn");

    if (!screenEnabled) {
        try {
            screenStream = await navigator.mediaDevices.getDisplayMedia({
                video: true,
                audio: true
            });

            const screenTrack = screenStream.getVideoTracks()[0];

            if (pc) {
                pc.addTrack(screenTrack, screenStream);

                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit("signal", { room, sdp: offer });
            }

            screenEnabled = true;
            btn.textContent = "⛔ Выключить экран";
            setStatus("Screen ON");

            screenTrack.onended = () => {
                if (screenEnabled) toggleScreen();
            };

        } catch (err) {
            console.error("SCREEN ERROR", err);
            alert("Screen share error: " + err.message);
        }
    } else {
        if (screenStream) {
            screenStream.getTracks().forEach(t => t.stop());
            screenStream = null;
        }

        if (pc) {
            pc.getSenders()
                .filter(s => s.track && s.track.kind === "video")
                .forEach(s => pc.removeTrack(s));

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit("signal", { room, sdp: offer });
        }

        screenEnabled = false;
        btn.textContent = "🖥️ Включить экран";
        setStatus("Screen OFF");
    }
}
</script>
</body>
</html>
