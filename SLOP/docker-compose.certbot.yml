
# docker-compose.certbot.yml
# Используй этот файл если хочешь автоматические сертификаты Let's Encrypt
# Запуск: docker compose -f docker-compose.certbot.yml up -d

services:

  app:
    build: .
    restart: unless-stopped
    expose:
      - "8000"
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.certbot.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    depends_on:
      - app
    networks:
      - internal

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    # Обновление каждые 12 часов (сертификат живёт 90 дней)
    entrypoint: >
      sh -c "
        certbot certonly --webroot -w /var/www/certbot
          --email your@email.com
          -d yourdomain.com
          --agree-tos --non-interactive &&
        trap exit TERM;
        while :; do
          certbot renew;
          sleep 12h & wait $${!};
        done
      "

volumes:
  certbot_www:
  certbot_certs:

networks:
  internal:
    driver: bridge
