services:

  app:
    build: .
    restart: unless-stopped
    # порт наружу не открываем — только nginx обращается внутри сети
    expose:
      - "8000"
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro       # сюда кладёшь SSL-сертификаты
    depends_on:
      - app
    networks:
      - internal

networks:
  internal:
    driver: bridge
