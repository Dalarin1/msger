<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oleg Chat</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: system-ui, sans-serif;
    background: #f6f7f9;
    height: 100vh;
    display: flex;
}

/* ── sidebar ── */
nav {
    width: 200px;
    background: white;
    border-right: 1px solid #e5e7eb;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    flex-shrink: 0;
}

nav .logo {
    font-size: 16px;
    font-weight: 700;
    padding: 0 20px 20px;
    border-bottom: 1px solid #e5e7eb;
    margin-bottom: 8px;
}

nav a {
    display: block;
    padding: 10px 20px;
    text-decoration: none;
    color: #555;
    font-size: 14px;
    border-radius: 0;
    transition: background .12s, color .12s;
}
nav a:hover { background: #f3f4f6; color: #111; }
nav a.active { background: #f3f4f6; color: #111; font-weight: 600; }

/* ── main ── */
main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.topbar {
    background: white;
    border-bottom: 1px solid #e5e7eb;
    padding: 14px 20px;
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}

.topbar span { font-size: 12px; color: #999; font-weight: 400; }

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.msg {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 10px 14px;
    max-width: 700px;
}

.meta {
    font-size: 12px;
    color: #999;
    margin-bottom: 4px;
}

.meta .sender {
    color: #111;
    font-weight: 600;
    cursor: pointer;
}
.meta .sender:hover { text-decoration: underline; }

.text {
    font-size: 14px;
    white-space: pre-wrap;
    word-break: break-word;
    color: #111;
}

#inputBar {
    display: flex;
    gap: 10px;
    padding: 12px 20px;
    border-top: 1px solid #e5e7eb;
    background: white;
}

#textInput {
    flex: 1;
    padding: 10px 14px;
    border-radius: 20px;
    border: 1px solid #ddd;
    outline: none;
    font-family: system-ui, sans-serif;
    font-size: 14px;
}
#textInput:focus { border-color: #111; }

#sendBtn {
    background: black;
    color: white;
    border: none;
    padding: 0 20px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-family: system-ui, sans-serif;
}
#sendBtn:hover { opacity: .9; }
</style>
</head>
<body>

<nav>
    <div class="logo">Oleg Chat</div>
    <a href="/" class="active">Главная</a>
    <a href="/chat">Мои чаты</a>
    <a href="/profile">Профиль</a>
</nav>

<main>
    <div class="topbar">
        Общий чат
        <span id="status">connecting...</span>
    </div>

    <div id="messages"></div>

    <div id="inputBar">
        <input id="textInput" placeholder="Сообщение...">
        <button id="sendBtn">Отправить</button>
    </div>
</main>

<script>
const messagesEl = document.getElementById("messages");
const statusEl   = document.getElementById("status");
const input      = document.getElementById("textInput");

let myId = localStorage.getItem("id");

async function ensureRegistered() {
    if (myId) return;
    const name = prompt("Введи имя:") || "anon";
    const res  = await fetch(`/register?name=${encodeURIComponent(name)}`);
    const data = await res.json();
    myId = data.id;
    localStorage.setItem("id",   myId);
    localStorage.setItem("name", data.name);
}

function add(msg) {
    const div = document.createElement("div");
    div.className = "msg";
    div.innerHTML = `
        <div class="meta">
            <span class="sender" onclick="location.href='/chat?with=${msg.sender_id}'">${escapeHtml(msg.sender)}</span>
        </div>
        <div class="text">${escapeHtml(msg.text)}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
}

function escapeHtml(s) {
    return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}

const ws = new WebSocket(`ws://${location.host}/ws`);
ws.onopen  = () => { statusEl.textContent = "online"; };
ws.onclose = () => { statusEl.textContent = "offline"; };
ws.onerror = () => { statusEl.textContent = "error"; };
ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    if (data.type === "history") { messagesEl.innerHTML = ""; data.messages.forEach(add); }
    if (data.type === "message") add(data.message);
    if (data.type === "register") ensureRegistered();
};

async function send() {
    const text = input.value.trim();
    if (!text) return;
    if (!myId) { myId = await ensureRegistered(); }
    const res  = await fetch(`/send_msg?text=${encodeURIComponent(text)}&id=${myId}`);
    const data = await res.json();
    if (data.type === "register") {
        localStorage.removeItem("id");
        myId = null;
        await ensureRegistered();
        await fetch(`/send_msg?text=${encodeURIComponent(text)}&id=${myId}`);
    }
    input.value = "";
}

input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
document.getElementById("sendBtn").addEventListener("click", send);

ensureRegistered();
</script>
</body>
</html>
