<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Oleg Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    font-family: Inter, sans-serif;
    background: #f6f7f9;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

header {
    background: white;
    padding: 14px 20px;
    border-bottom: 1px solid #e5e7eb;
    font-weight: 600;
}

#status {
    font-size: 12px;
    color: #666;
    margin-left: 10px;
}

#messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
}

.msg {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 10px 14px;
    margin-bottom: 10px;
}

.meta {
    font-size: 12px;
    color: #666;
    margin-bottom: 4px;
}

.text {
    white-space: pre-wrap;
    word-break: break-word;
}

#inputBar {
    display: flex;
    gap: 10px;
    padding: 12px;
    border-top: 1px solid #e5e7eb;
    background: white;
}

#text {
    flex: 1;
    padding: 12px 14px;
    border-radius: 20px;
    border: 1px solid #ddd;
    outline: none;
}

button {
    background: black;
    color: white;
    border: none;
    padding: 0 18px;
    border-radius: 20px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

</style>
</head>

<body>

<header>
    Oleg Chat
    <span id="status">connecting...</span>
</header>

<div id="messages"></div>

<div id="inputBar">
    <input id="text" placeholder="Сообщение...">
    <button>Send</button>
</div>

<script>

const messages = document.getElementById("messages");
const statusEl = document.getElementById("status");
const input = document.getElementById("text");

const name = localStorage.getItem("name")
    || prompt("Name?") || "anon";

localStorage.setItem("name", name);

function add(msg) {

    const div = document.createElement("div");
    div.className = "msg";

    div.innerHTML = `
        <div class="meta">
            <span class="sender-link" onclick="location.href='/chat?with=${msg.sender_id}'">${msg.sender}</span>
        </div>
        <div class="text">${escapeHtml(msg.text)}</div>
    `;

    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function escapeHtml(s) {
    return s
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
}

const ws = new WebSocket(`ws://${location.host}/ws`);

ws.onopen = () => {
    statusEl.textContent = "online";
};

ws.onclose = () => {
    statusEl.textContent = "offline";
};

ws.onerror = () => {
    statusEl.textContent = "error";
};

ws.onmessage = (e) => {

    const data = JSON.parse(e.data);
    if (data.type === "register"){
        init().then(id => { myId = id; });
    }
    if (data.type === "history") {

        messages.innerHTML = "";
        data.messages.forEach(add);

    }

    if (data.type === "message") {
        add(data.message);
    }
};

async function init() {
    let id = localStorage.getItem("id");

    if (!id) {
        const name = prompt("Введи имя:") || "anon";
        const res = await fetch(
            `/register?name=${encodeURIComponent(name)}`
        );
        const data = await res.json();
        id = data.id;
        localStorage.setItem("id", id);
        localStorage.setItem("name", data.name);
    }

    return id;
}

// send() вызывается только после init()
let myId = null;
init().then(id => { myId = id; });

async function send() {
    const text = input.value.trim();
    if (!text) return;

    // Если id ещё нет — сначала регистрируемся
    if (!myId) {
        myId = await init();
    }

    const res = await fetch(
        `/send_msg?text=${encodeURIComponent(text)}&id=${myId}`
    );
    const data = await res.json();

    // Сервер говорит что id не найден — перерегистрируемся
    if (data.type === "register") {
        localStorage.removeItem("id");
        myId = await init();
        // Повторяем отправку
        await fetch(`/send_msg?text=${encodeURIComponent(text)}&id=${myId}`);
    }

    input.value = "";
}

input.addEventListener("keydown", e => {
    document.querySelector("button").addEventListener("click", send);

    if (e.key === "Enter") send();
});

</script>

</body>
</html>
