<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мои чаты</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: system-ui, sans-serif;
    background: #f6f7f9;
    height: 100vh;
    display: flex;
}

nav {
    width: 200px;
    background: white;
    border-right: 1px solid #e5e7eb;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    flex-shrink: 0;
}
nav .logo { font-size: 16px; font-weight: 700; padding: 0 20px 20px; border-bottom: 1px solid #e5e7eb; margin-bottom: 8px; }
nav a { display: block; padding: 10px 20px; text-decoration: none; color: #555; font-size: 14px; transition: background .12s, color .12s; }
nav a:hover { background: #f3f4f6; color: #111; }
nav a.active { background: #f3f4f6; color: #111; font-weight: 600; }

main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
    background: white;
    border-bottom: 1px solid #e5e7eb;
    padding: 14px 20px;
    font-weight: 600;
    font-size: 15px;
    display: flex;
    align-items: center;
    gap: 10px;
}
.topbar span { font-size: 12px; color: #999; font-weight: 400; margin-left: auto; }

.screen { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

/* ── list ── */
#listScreen .toolbar {
    display: flex;
    gap: 8px;
    padding: 12px 20px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
}
#listScreen .toolbar input {
    flex: 1;
    padding: 9px 14px;
    border: 1px solid #ddd;
    border-radius: 20px;
    font-family: system-ui, sans-serif;
    font-size: 14px;
    outline: none;
}
#listScreen .toolbar input:focus { border-color: #111; }
#listScreen .toolbar button {
    background: black;
    color: white;
    border: none;
    padding: 0 16px;
    border-radius: 20px;
    cursor: pointer;
    font-size: 14px;
    font-family: system-ui, sans-serif;
}
#listScreen .toolbar button:hover { opacity: .9; }

#chatList { flex: 1; overflow-y: auto; }

.chat-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 20px;
    background: white;
    border-bottom: 1px solid #e5e7eb;
    cursor: pointer;
}
.chat-item:hover { background: #f9f9f9; }

.avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: #e5e7eb;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 14px; color: #555;
    flex-shrink: 0; text-transform: uppercase;
}

.chat-info { flex: 1; min-width: 0; }
.chat-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-preview { font-size: 12px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
.chat-time { font-size: 11px; color: #aaa; flex-shrink: 0; align-self: flex-start; margin-top: 2px; }

.empty-state { padding: 40px 20px; text-align: center; color: #aaa; font-size: 13px; }

/* ── chat bubbles ── */
#messages {
    flex: 1; overflow-y: auto;
    padding: 10px 16px;
    display: flex; flex-direction: column; gap: 2px;
}
/* Группировка: если подряд идут сообщения одного отправителя — схлопываем отступы */
.msg-wrap { display: flex; width: 100%; }
.msg-wrap.mine   { justify-content: flex-end; }
.msg-wrap.theirs { justify-content: flex-start; }
.msg-wrap + .msg-wrap.mine.prev-mine     { margin-top: 1px; }
.msg-wrap + .msg-wrap.theirs.prev-theirs { margin-top: 1px; }
.msg-wrap.group-start { margin-top: 10px; }

.bubble {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 14px;
    padding: 8px 14px;
    max-width: 700px;
}

.mine   .bubble { background: #111; color: white; border-bottom-right-radius: 4px; }
.theirs .bubble { background: white; border: 1px solid #e5e7eb; color: #111; border-bottom-left-radius: 4px; }

/* Мета (имя + время) показываем только у первого в группе */
.bubble-meta {
    font-size: 10px;
    margin-top: 2px;
    opacity: .5;
}
.mine   .bubble-meta { text-align: right; }
.theirs .bubble-meta { text-align: left; }
.hide-meta .bubble-meta { display: none; }

/* ── вложения ── */
.attachments {
    margin-top: 5px;
    display: flex;
    flex-direction: column;
    gap: 3px;
}

.attachment-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    padding: 3px 0;
    text-decoration: none;
    opacity: .85;
}
.mine   .attachment-link { color: #c7d2fe; }
.theirs .attachment-link { color: #4f46e5; }
.attachment-link:hover { opacity: 1; text-decoration: underline; }
.attachment-link .icon { font-size: 14px; flex-shrink: 0; }

/* ── прикреплённые файлы (pending) ── */
#pendingFiles {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 20px 0;
    background: white;
}
.pending-chip {
    display: flex;
    align-items: center;
    gap: 6px;
    background: #f3f4f6;
    border: 1px solid #e5e7eb;
    border-radius: 20px;
    padding: 4px 10px 4px 8px;
    font-size: 12px;
    color: #333;
}
.pending-chip .remove {
    cursor: pointer;
    color: #999;
    font-size: 14px;
    line-height: 1;
    background: none;
    border: none;
    padding: 0;
}
.pending-chip .remove:hover { color: #111; }

/* ── input bar ── */
#inputBar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-top: 1px solid #e5e7eb;
    background: white;
}

/* Скрепка */
#attachBtn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 20px;
    line-height: 1;
    color: #888;
    padding: 4px;
    border-radius: 8px;
    transition: color .12s, background .12s;
    flex-shrink: 0;
}
#attachBtn:hover { color: #111; background: #f3f4f6; }
#fileInput { display: none; }

#msgInput {
    flex: 1;
    padding: 9px 14px;
    border-radius: 20px;
    border: 1px solid #ddd;
    outline: none;
    font-family: system-ui, sans-serif;
    font-size: 14px;
    resize: none;
}
#msgInput:focus { border-color: #111; }

#sendBtn {
    background: black; color: white; border: none;
    padding: 0 18px; height: 38px; border-radius: 20px; cursor: pointer;
    font-size: 14px; font-family: system-ui, sans-serif;
    flex-shrink: 0;
}
#sendBtn:hover { opacity: .9; }

/* ── upload progress ── */
#uploadStatus {
    font-size: 12px;
    color: #888;
    padding: 2px 20px 6px;
    background: white;
    display: none;
}

/* ── modal ── */
#modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.4);
    display: none; align-items: center; justify-content: center;
    z-index: 100;
}
#modal.open { display: flex; }
.modal-box {
    background: white; border-radius: 16px;
    padding: 24px; width: 100%; max-width: 380px; margin: 16px;
    display: flex; flex-direction: column; gap: 14px;
}
.modal-box h3 { font-size: 16px; }
.modal-box label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
.modal-box input {
    width: 100%; padding: 10px 14px;
    border: 1px solid #ddd; border-radius: 10px;
    font-family: system-ui, sans-serif; font-size: 14px; outline: none;
}
.modal-box input:focus { border-color: #111; }
.modal-error { font-size: 13px; color: #e53e3e; display: none; }
.modal-actions { display: flex; gap: 8px; }
.modal-actions button {
    flex: 1; border: none; border-radius: 10px;
    padding: 10px; cursor: pointer;
    font-family: system-ui, sans-serif; font-size: 14px;
}
.btn-cancel { background: #f3f4f6; color: #333; }
.btn-open   { background: black; color: white; flex: 2; }
.btn-cancel:hover { background: #e5e7eb; }
.btn-open:hover   { opacity: .9; }

/* ── auth overlay ── */
#authOverlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,.35);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center; justify-content: center;
}
#authOverlay.visible { display: flex; }
#authCard {
    background: white; border: 1px solid #e5e7eb;
    border-radius: 16px; padding: 28px 32px;
    width: 320px; display: flex; flex-direction: column; gap: 16px;
    position: relative;
}
#authCard .close-btn {
    position: absolute; top: 14px; right: 16px;
    background: none; border: none; font-size: 18px;
    color: #999; cursor: pointer; padding: 2px 6px; border-radius: 6px;
}
#authCard .close-btn:hover { background: #f3f4f6; color: #111; }
#authCard h2 { font-size: 16px; font-weight: 700; color: #111; margin-right: 24px; }
#authCard p  { font-size: 14px; color: #555; line-height: 1.5; }
.auth-btn {
    display: block; text-align: center; padding: 10px;
    border-radius: 20px; font-size: 14px; font-family: system-ui, sans-serif;
    font-weight: 600; cursor: pointer; text-decoration: none; transition: opacity .12s;
}
.auth-btn.primary   { background: black; color: white; border: none; }
.auth-btn.secondary { background: white; color: #111; border: 1px solid #e5e7eb; }
.auth-btn:hover { opacity: .82; }
</style>
</head>
<body>

<nav>
    <div class="logo">Oleg Chat</div>
    <a href="/">Главная</a>
    <a href="/chat" class="active">Мои чаты</a>
    <a href="/profile">Профиль</a>
</nav>

<main>
    <div class="topbar">
        <span id="topbarTitle">Мои чаты</span>
        <span id="wsStatus"></span>
        <button id="backBtn" onclick="goToList()"
            style="display:none;background:none;color:#555;border:1px solid #ddd;
                   padding:4px 12px;border-radius:20px;font-size:13px;cursor:pointer;margin-left:0;">
            ← назад
        </button>
    </div>

    <!-- список -->
    <div id="listScreen" class="screen active">
        <div class="toolbar">
            <input id="searchInput" placeholder="поиск..." oninput="filterChats()">
            <button onclick="openModal()">+ новый</button>
        </div>
        <div id="chatList"><div class="empty-state">загрузка...</div></div>
    </div>

    <!-- чат -->
    <div id="chatScreen" class="screen">
        <div id="messages"></div>
        <div id="pendingFiles"></div>
        <div id="uploadStatus"></div>
        <div id="inputBar">
            <button id="attachBtn" onclick="document.getElementById('fileInput').click()" title="Прикрепить файл">📎</button>
            <input type="file" id="fileInput" multiple onchange="handleFileSelect(event)">
            <input id="msgInput" placeholder="Сообщение...">
            <button id="sendBtn" onclick="sendMessage()">Отправить</button>
        </div>
    </div>
</main>

<!-- new chat modal -->
<div id="modal">
    <div class="modal-box">
        <h3>Новый чат</h3>
        <div>
            <label>ID собеседника</label>
            <input id="targetIdInput" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx">
            <div class="modal-error" id="modalError">Пользователь не найден</div>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Отмена</button>
            <button class="btn-open"   onclick="startNewChat()">Открыть</button>
        </div>
    </div>
</div>

<!-- auth overlay -->
<div id="authOverlay">
    <div id="authCard">
        <button class="close-btn" onclick="hideAuthModal()">✕</button>
        <h2>Нужен аккаунт</h2>
        <p>Чтобы открывать чаты и писать сообщения, войди или создай аккаунт.</p>
        <a class="auth-btn primary" href="/login">Войти</a>
        <a class="auth-btn secondary" href="/login#register">Зарегистрироваться</a>
    </div>
</div>

<script>
// ── токены ────────────────────────────────────────────────────────────────
let accessToken = null;
let myId = null;

function parseJwtPayload(token) {
    try { return JSON.parse(atob(token.split(".")[1])); } catch { return null; }
}

async function refreshAccessToken() {
    const res = await fetch("/auth/refresh", { method: "POST", credentials: "include" });
    if (!res.ok) return false;
    const data = await res.json();
    accessToken = data.access_token;
    myId = parseJwtPayload(accessToken)?.sub ?? null;
    return true;
}

async function apiFetch(url, options = {}) {
    if (!accessToken) {
        const ok = await refreshAccessToken();
        if (!ok) return null;
    }
    const doReq = () => fetch(url, {
        ...options,
        credentials: "include",
        headers: { ...options.headers, "Authorization": `Bearer ${accessToken}` },
    });
    let res = await doReq();
    if (res.status === 401) {
        const ok = await refreshAccessToken();
        if (!ok) return null;
        res = await doReq();
    }
    return res;
}

// ── auth modal ────────────────────────────────────────────────────────────
let allChats = [];
let currentChatId = null;
let ws = null;

// Список загруженных вложений: [{url, mime, original_name}]
let pendingAttachments = [];

const authOverlay = document.getElementById("authOverlay");
function showAuthModal() { authOverlay.classList.add("visible"); }
function hideAuthModal()  { authOverlay.classList.remove("visible"); }
authOverlay.addEventListener("click", e => { if (e.target === authOverlay) hideAuthModal(); });
document.addEventListener("keydown", e => {
    if (e.key === "Escape" && authOverlay.classList.contains("visible")) hideAuthModal();
});

function ensureLoggedIn() {
    if (myId) return true;
    showAuthModal();
    return false;
}

// ── инициализация ─────────────────────────────────────────────────────────
(async () => {
    const ok = await refreshAccessToken();
    if (!ok) { showAuthModal(); return; }
    await loadChats();
    const withId = new URLSearchParams(location.search).get("with");
    if (withId) await openChat(withId);
})();

// ── список чатов ──────────────────────────────────────────────────────────
async function loadChats() {
    const res = await apiFetch("/my/chats");
    if (!res) { document.getElementById("chatList").innerHTML = `<div class="empty-state">ошибка загрузки</div>`; return; }
    const data = await res.json();
    allChats = data.chats || [];
    renderChats(allChats);
}

function renderChats(chats) {
    const el = document.getElementById("chatList");
    if (!chats.length) {
        el.innerHTML = `<div class="empty-state">Диалогов пока нет. Нажми «+ новый».</div>`;
        return;
    }
    el.innerHTML = chats.map(c => {
        const initials = (c.other_name || "?").slice(0, 2).toUpperCase();
        const preview  = c.last_message
            ? (c.last_message.sender_id === myId ? "Вы: " : "") + escapeHtml(c.last_message.text).slice(0, 60)
            : "нет сообщений";
        const time = c.last_message
            ? new Date(c.last_message.timestamp).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" })
            : "";
        return `<div class="chat-item" onclick="openChat('${c.other_id}')">
            <div class="avatar">${initials}</div>
            <div class="chat-info">
                <div class="chat-name">${escapeHtml(c.other_name)}</div>
                <div class="chat-preview">${preview}</div>
            </div>
            <div class="chat-time">${time}</div>
        </div>`;
    }).join("");
}

function filterChats() {
    const q = document.getElementById("searchInput").value.toLowerCase();
    renderChats(allChats.filter(c => c.other_name.toLowerCase().includes(q)));
}

// ── открыть чат ───────────────────────────────────────────────────────────
async function openChat(targetId) {
    closeModal();
    document.getElementById("modalError").style.display = "none";

    const res = await apiFetch(`/chat/open?with_id=${encodeURIComponent(targetId)}`);
    if (!res || !res.ok) { showModalError("Пользователь не найден"); return; }

    currentChatId = (await res.json()).chat_id;
    const found = allChats.find(c => c.other_id === targetId);
    const name  = found ? found.other_name : targetId.slice(0, 8) + "…";
    document.getElementById("topbarTitle").textContent = name;
    document.getElementById("backBtn").style.display = "block";

    showScreen("chatScreen");
    connectWs(currentChatId);
    document.getElementById("msgInput").focus();
}

// ── WebSocket ─────────────────────────────────────────────────────────────
function connectWs(chatId) {
    if (ws) ws.close();
    const proto = location.protocol === "https:" ? "wss" : "ws";
    ws = new WebSocket(`${proto}://${location.host}/ws/chat/${chatId}?token=${encodeURIComponent(accessToken)}`);

    const st = document.getElementById("wsStatus");
    ws.onopen  = () => { st.textContent = "online";  st.style.color = "#16a34a"; };
    ws.onclose = () => { st.textContent = "offline"; st.style.color = "#999"; };
    ws.onerror = () => { st.textContent = "ошибка";  st.style.color = "#e53e3e"; };

    ws.onmessage = (e) => {
        const data = JSON.parse(e.data);
        if (data.type === "history") {
            const msgEl = document.getElementById("messages");
            msgEl.innerHTML = "";
            if (!data.messages.length) msgEl.innerHTML = `<div class="empty-state">Сообщений пока нет</div>`;
            else data.messages.forEach((m, i) => addMessage(m, data.messages[i - 1] ?? null));
        }
        if (data.type === "message") {
            const msgEl = document.getElementById("messages");
            const ph = msgEl.querySelector(".empty-state");
            if (ph) ph.remove();
            // Последнее сообщение в списке — чтобы определить группировку
            const lastWrap = msgEl.querySelector(".msg-wrap:last-child");
            const lastSenderId = lastWrap?.dataset.senderId ?? null;
            addMessage(data.message, lastSenderId ? { sender_id: lastSenderId } : null);
        }
    };
}

function attachmentIcon(mime) {
    if (!mime) return "📄";
    if (mime.startsWith("image/")) return "🖼";
    if (mime.startsWith("audio/")) return "🎵";
    if (mime.startsWith("video/")) return "🎬";
    return "📄";
}

function renderAttachments(attachments, isMine) {
    if (!attachments || !attachments.length) return "";
    return `<div class="attachments">${attachments.map(a => {
        const icon = attachmentIcon(a.mime);
        const label = escapeHtml(a.original_name || a.url);
        return `<a class="attachment-link" href="${escapeHtml(a.url)}" target="_blank" rel="noopener">
            <span class="icon">${icon}</span>${label}
        </a>`;
    }).join("")}</div>`;
}

function addMessage(msg, prevMsg) {
    const isMine   = msg.sender_id === myId;
    const isSameAuthor = prevMsg && prevMsg.sender_id === msg.sender_id;
    const time     = new Date(msg.timestamp).toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
    const msgEl    = document.getElementById("messages");
    const wrap     = document.createElement("div");

    wrap.className = `msg-wrap ${isMine ? "mine" : "theirs"}${isSameAuthor ? " hide-meta" : " group-start"}`;
    wrap.dataset.senderId = msg.sender_id;

    const attachmentsHtml = renderAttachments(msg.attachments, isMine);

    wrap.innerHTML = `<div class="bubble">
        ${msg.text ? escapeHtml(msg.text) : ""}
        ${attachmentsHtml}
        <div class="bubble-meta">${isMine ? time : escapeHtml(msg.sender) + " · " + time}</div>
    </div>`;

    msgEl.appendChild(wrap);
    msgEl.scrollTop = msgEl.scrollHeight;
}

// ── выбор файлов ──────────────────────────────────────────────────────────
function handleFileSelect(event) {
    const files = Array.from(event.target.files);
    event.target.value = ""; // сбросить, чтобы можно было выбрать тот же файл снова
    files.forEach(uploadFile);
}

async function uploadFile(file) {
    const statusEl = document.getElementById("uploadStatus");
    statusEl.style.display = "block";
    statusEl.textContent = `Загрузка ${file.name}…`;

    const formData = new FormData();
    formData.append("file", file);

    const res = await apiFetch("/upload", { method: "POST", body: formData });
    if (!res || !res.ok) {
        const err = res ? (await res.json().catch(() => ({}))).detail : "ошибка сети";
        statusEl.textContent = `Ошибка: ${err || "не удалось загрузить"}`;
        setTimeout(() => { statusEl.style.display = "none"; }, 3000);
        return;
    }

    const data = await res.json();
    pendingAttachments.push({ url: data.url, mime: data.mime, original_name: data.original_name });
    renderPendingChips();
    statusEl.style.display = "none";
}

function renderPendingChips() {
    const el = document.getElementById("pendingFiles");
    el.innerHTML = pendingAttachments.map((a, i) => {
        const icon = attachmentIcon(a.mime);
        return `<div class="pending-chip">
            <span>${icon}</span>
            <span>${escapeHtml(a.original_name || a.url)}</span>
            <button class="remove" onclick="removePending(${i})">✕</button>
        </div>`;
    }).join("");
}

function removePending(idx) {
    pendingAttachments.splice(idx, 1);
    renderPendingChips();
}

// ── отправка ──────────────────────────────────────────────────────────────
async function sendMessage() {
    if (!ensureLoggedIn()) return;
    const input = document.getElementById("msgInput");
    const text  = input.value.trim();
    if (!text && pendingAttachments.length === 0) return;
    if (!currentChatId) return;

    input.value = "";
    const attachments = [...pendingAttachments];
    pendingAttachments = [];
    renderPendingChips();

    const res = await apiFetch(`/chat/${currentChatId}/`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text, attachments }),
    });

    if (!res) {
        accessToken = null;
        myId = null;
        showAuthModal();
    }
}

// ── навигация ─────────────────────────────────────────────────────────────
function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function goToList() {
    if (ws) { ws.close(); ws = null; }
    currentChatId = null;
    pendingAttachments = [];
    renderPendingChips();
    document.getElementById("topbarTitle").textContent = "Мои чаты";
    document.getElementById("backBtn").style.display = "none";
    document.getElementById("wsStatus").textContent = "";
    loadChats();
    showScreen("listScreen");
}

// ── модалка нового чата ───────────────────────────────────────────────────
function openModal() {
    if (!ensureLoggedIn()) return;
    document.getElementById("targetIdInput").value = "";
    document.getElementById("modalError").style.display = "none";
    document.getElementById("modal").classList.add("open");
    setTimeout(() => document.getElementById("targetIdInput").focus(), 50);
}
function closeModal() { document.getElementById("modal").classList.remove("open"); }
function showModalError(msg) {
    const el = document.getElementById("modalError");
    el.textContent = msg;
    el.style.display = "block";
    document.getElementById("modal").classList.add("open");
}
async function startNewChat() {
    const id = document.getElementById("targetIdInput").value.trim();
    if (!id) return;
    await openChat(id);
    await loadChats();
}

function escapeHtml(s) {
    return String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;");
}

document.getElementById("msgInput").addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById("targetIdInput").addEventListener("keydown", e => {
    if (e.key === "Enter") startNewChat();
    if (e.key === "Escape") closeModal();
});
document.getElementById("modal").addEventListener("click", e => {
    if (e.target === document.getElementById("modal")) closeModal();
});
</script>
